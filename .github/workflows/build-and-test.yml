name: CI/CD - Build and Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal
        override: true
        components: rustfmt, clippy
    
    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache cargo index
      uses: actions/cache@v3
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache cargo build
      uses: actions/cache@v3
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Check code formatting
      run: cargo fmt -- --check
    
    - name: Run clippy linter
      run: cargo clippy -- -D warnings
    
    - name: Build and test with script wrapper
      run: ./scripts/build.sh --release --test
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kitty-launcher-release
        path: target/release/kitty-launcher
    
    - name: Display build info
      run: |
        echo "✅ Build successful!"
        echo "Binary size: $(du -h target/release/kitty-launcher | cut -f1)"
        echo "Build details:"
        ./target/release/kitty-launcher --help 2>&1 || echo "Help not implemented (expected)"

  security_audit:
    name: Security Audit (cargo-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit --deny warnings
