name: Release - Build and Publish Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-matrix:
    name: Build for ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
            dpkg_arch: amd64
          - target: aarch64-unknown-linux-gnu
            arch: arm64
            dpkg_arch: arm64
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal
        override: true
        target: ${{ matrix.target }}
    
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential debhelper dpkg-dev
        
    - name: Install cross-compilation tools for ARM64
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      run: |
        sudo apt-get install -y gcc-aarch64-linux-gnu
        cargo install cross
    
    - name: Build release binary
      run: |
        if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
          cross build --release --target ${{ matrix.target }}
        else
          cargo build --release --target ${{ matrix.target }}
        fi
    
    - name: Strip binary
      run: |
        if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
          aarch64-linux-gnu-strip target/${{ matrix.target }}/release/kitty-launcher
        else
          strip target/${{ matrix.target }}/release/kitty-launcher
        fi
    
    - name: Create Debian package structure
      env:
        VERSION: ${{ github.ref_name }}
        DPKG_ARCH: ${{ matrix.dpkg_arch }}
        TARGET: ${{ matrix.target }}
      run: |
        VERSION=${VERSION#v}
        mkdir -p debian_build/usr/bin
        mkdir -p debian_build/usr/share/applications
        mkdir -p debian_build/usr/share/man/man1
        mkdir -p debian_build/usr/share/info
        mkdir -p debian_build/etc/bash_completion.d
        mkdir -p debian_build/usr/share/zsh/site-functions
        
        # Copy binary
        cp target/${TARGET}/release/kitty-launcher debian_build/usr/bin/
        
        # Copy documentation
        cp kitty-launcher.desktop debian_build/usr/share/applications/ || true
        cp kitty-launcher.1 debian_build/usr/share/man/man1/ || true
        cp kitty-launcher.info debian_build/usr/share/info/ || true
        
        # Generate and copy completions
        target/${TARGET}/release/kitty-launcher --generate-completions bash > debian_build/etc/bash_completion.d/kitty-launcher 2>/dev/null || true
        target/${TARGET}/release/kitty-launcher --generate-completions zsh > debian_build/usr/share/zsh/site-functions/_kitty-launcher 2>/dev/null || true
        
        # Create DEBIAN metadata directory
        mkdir -p debian_build/DEBIAN
        
        # Generate control file with proper formatting
        {
          echo "Package: kitty-launcher"
          echo "Version: ${VERSION}-1"
          echo "Architecture: ${DPKG_ARCH}"
          echo "Maintainer: OpenCode Contributors <contributors@opencode.ai>"
          echo "Homepage: https://github.com/pilakkat1964/kitty-launcher"
          echo "Description: Terminal Session Manager for Kitty Emulator"
          echo " A robust Rust-based wrapper for the kitty terminal emulator that allows"
          echo " launching terminal sessions with flexible configuration presets."
          echo " ."
          echo " Features:"
          echo "  - Multiple session management"
          echo "  - Desktop environment integration"
          echo "  - Shell completions (bash/zsh)"
          echo "  - KDE Plasma folder view support"
          echo "  - Security-focused input validation"
        } > debian_build/DEBIAN/control
        
        # Generate postinst script
        {
          echo "#!/bin/bash"
          echo "set -e"
          echo ""
          echo "# Update desktop database"
          echo "update-desktop-database /usr/share/applications 2>/dev/null || true"
          echo ""
          echo "# Message about shell completion"
          echo "echo \"Shell completions installed. To enable them:\""
          echo "echo \"  Bash: source ~/.bashrc or run 'source <(kitty-launcher --generate-completions bash)'\""
          echo "echo \"  Zsh:  source ~/.zshrc or run 'source <(kitty-launcher --generate-completions zsh)'\""
          echo ""
          echo "exit 0"
        } > debian_build/DEBIAN/postinst
        chmod 755 debian_build/DEBIAN/postinst
    
    - name: Build .deb package
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        dpkg-deb --build debian_build kitty-launcher_${VERSION}-1_${{ matrix.dpkg_arch }}.deb
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: kitty-launcher_${{ matrix.dpkg_arch }}.deb
        path: kitty-launcher_*_${{ matrix.dpkg_arch }}.deb
        retention-days: 1

  create-release:
    name: Create Release with Assets
    needs: build-matrix
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download artifacts
      uses: actions/download-artifact@v4
    
    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal
        override: true
    
    - name: Build release binary for source archive
      run: cargo build --release
    
    - name: Create source archive
      run: |
        git archive --format=tar.gz --prefix=kitty-launcher-${GITHUB_REF#refs/tags/}/ HEAD > kitty-launcher-${GITHUB_REF#refs/tags/}.tar.gz
    
    - name: Prepare release assets
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        
        # List all downloaded debs
        echo "Available Debian packages:"
        find . -name "*.deb" -type f | sort
        
        # Rename for clarity
        if [ -f "kitty-launcher_amd64.deb/kitty-launcher_${VERSION}-1_amd64.deb" ]; then
          cp "kitty-launcher_amd64.deb/kitty-launcher_${VERSION}-1_amd64.deb" "kitty-launcher_${VERSION}-1_amd64.deb"
        fi
        
        if [ -f "kitty-launcher_arm64.deb/kitty-launcher_${VERSION}-1_arm64.deb" ]; then
          cp "kitty-launcher_arm64.deb/kitty-launcher_${VERSION}-1_arm64.deb" "kitty-launcher_${VERSION}-1_arm64.deb"
        fi
        
        # Strip and prepare binary
        strip target/release/kitty-launcher
        cp target/release/kitty-launcher kitty-launcher-${GITHUB_REF#refs/tags/}-linux-amd64
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          kitty-launcher-*.tar.gz
          kitty-launcher_*-1_amd64.deb
          kitty-launcher_*-1_arm64.deb
          kitty-launcher-*-linux-amd64
        body: |
          ## 📦 Release Assets
          
          ### Binaries
          - **kitty-launcher-${{ github.ref_name }}-linux-amd64** - Precompiled binary for x86_64
          
          ### Debian Packages (Recommended)
          - **kitty-launcher_*-1_amd64.deb** - For x86_64 systems
          - **kitty-launcher_*-1_arm64.deb** - For ARM64 systems (Raspberry Pi, etc.)
          
          ### Source
          - **kitty-launcher-${{ github.ref_name }}.tar.gz** - Source code archive
          
          ## 🚀 Installation
          
          ### On Debian/Ubuntu (AMD64):
          ```bash
          sudo dpkg -i kitty-launcher_*-1_amd64.deb
          ```
          
          ### On ARM64 systems:
          ```bash
          sudo dpkg -i kitty-launcher_*-1_arm64.deb
          ```
          
          ### From source:
          ```bash
          tar xzf kitty-launcher-*.tar.gz
          cd kitty-launcher-*
          cargo build --release
          sudo cp target/release/kitty-launcher /usr/local/bin/
          ```
          
          ## 📖 Documentation
          - **README.md** - Getting started guide
          - **LEARNING_GUIDE.md** - Rust learning resource
          - **INSTALL.md** - Detailed installation instructions
          - **QUICK_REFERENCE.md** - Command reference
          
          See the repository for complete documentation.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Create GitHub Release Summary
      run: |
        echo "## Release Created Successfully ✅" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Version**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Assets Included" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Source archive (tar.gz)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Debian package for AMD64 (.deb)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Debian package for ARM64 (.deb)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Precompiled binary (x86_64)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Installation Methods" >> $GITHUB_STEP_SUMMARY
        echo "1. **Recommended**: Install via Debian package" >> $GITHUB_STEP_SUMMARY
        echo "2. Use precompiled binary for immediate use" >> $GITHUB_STEP_SUMMARY
        echo "3. Build from source for other architectures" >> $GITHUB_STEP_SUMMARY

